version: '3.8'

services:
  app:
    build: .
    container_name: comsoc-c2
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_KEY=${SUPABASE_KEY}
      - TELEGRAM_TOKEN=${TELEGRAM_TOKEN}
      - GOOGLE_API_KEY=${GOOGLE_API_KEY}
      - PYTHONUNBUFFERED=1
    volumes:
      - ./data:/app/data
    networks:
      - comsoc-network

  # Redis para cache (opcional)
  redis:
    image: redis:7-alpine
    container_name: comsoc-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - comsoc-network

networks:
  comsoc-network:
    driver: bridge

volumes:
  redis-data:
